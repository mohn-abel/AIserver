<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.08);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", "Microsoft YaHei", system-ui, sans-serif;
            color: var(--text-primary);
            overflow: hidden;
            background: var(--bg-primary);
            height: 100vh;
        }

        /* 星空背景 */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 3s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 1; }
        }

        /* 加载画面 */
        #loading-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        #loading-screen h1 {
            font-size: 2.2em;
            margin-bottom: 28px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: pulse 2s infinite;
            letter-spacing: 2px;
        }
        @keyframes pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.4); }
        }

        .progress-track {
            width: 300px;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            width: 0;
            transition: width 0.25s ease;
            box-shadow: 0 0 12px var(--accent-glow);
        }
        #loading-screen p {
            margin-top: 18px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 菜单画面 */
        #menu-screen {
            display: none;
            text-align: center;
            padding: 80px 20px 0;
            animation: fadeUp 0.8s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #menu-screen h1 {
            font-size: 2.4em;
            margin-bottom: 14px;
            background: linear-gradient(135deg, #6c5ce7, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 40px;
        }
        .divider {
            margin: 0 auto 36px;
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }
        .menu-item {
            display: block;
            margin: 14px auto;
            padding: 16px 28px;
            width: 380px;
            max-width: 90vw;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            color: var(--text-primary);
            cursor: pointer;
            transition: var(--transition);
            backdrop-filter: blur(8px);
        }
        .menu-item:hover {
            border-color: var(--accent);
            background: rgba(108,92,231,0.12);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }
        .menu-item.logout {
            border-color: rgba(239,68,68,0.3);
            color: #ef4444;
            margin-top: 32px;
        }
        .menu-item.logout:hover {
            border-color: #ef4444;
            background: rgba(239,68,68,0.1);
            box-shadow: 0 0 16px rgba(239,68,68,0.3);
        }
    </style>
</head>
<body>
    <!-- 星空 -->
    <script>
        for (let i = 0; i < 100; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.top  = Math.random() * window.innerHeight + 'px';
            s.style.left = Math.random() * window.innerWidth + 'px';
            s.style.animationDuration = (2 + Math.random() * 4) + 's';
            s.style.animationDelay = Math.random() * 3 + 's';
            document.body.appendChild(s);
        }
    </script>

    <!-- 加载 -->
    <div id="loading-screen">
        <h1>AI 助手 启动中</h1>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <p>系统正在初始化，请稍候...</p>
    </div>

    <!-- 菜单 -->
    <div id="menu-screen">
        <h1>欢迎使用 AI 助手</h1>
        <p class="subtitle">选择一个功能开始体验</p>
        <div class="divider"></div>
        <div class="menu-item" id="chat-service">AI 智能聊天</div>
        <div class="menu-item" id="image-service">AI 图像识别</div>
        <div class="menu-item logout" id="logout">退出登录</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fill = document.getElementById('progressFill');
            const loading = document.getElementById('loading-screen');
            const menu = document.getElementById('menu-screen');
            let pct = 0;
            const timer = setInterval(() => {
                pct += 8;
                fill.style.width = pct + '%';
                if (pct >= 100) {
                    clearInterval(timer);
                    setTimeout(() => {
                        loading.style.display = 'none';
                        menu.style.display = 'block';
                    }, 350);
                }
            }, 200);
        });

        function navigate(path, errMsg) {
            fetch(path, { headers: { 'Accept': 'text/html' } })
                .then(r => r.text())
                .then(html => { document.open(); document.write(html); document.close(); })
                .catch(() => alert(errMsg));
        }

        document.getElementById('chat-service').addEventListener('click',  () => navigate('/chat',   '进入聊天服务失败'));
        document.getElementById('image-service').addEventListener('click', () => navigate('/upload', '进入图像识别服务失败'));

        document.getElementById('logout').addEventListener('click', async () => {
            const userId = sessionStorage.getItem('userId');
            try {
                const r = await fetch('/user/logout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId, type: 'manual', gameType: 0 })
                });
                if (!r.ok) throw new Error('fail');
                sessionStorage.clear();
                const hr = await fetch('/');
                const html = await hr.text();
                document.open(); document.write(html); document.close();
            } catch { alert('退出登录失败'); }
        });

        window.addEventListener('beforeunload', () => {
            const userId = sessionStorage.getItem('userId');
            if (userId) {
                navigator.sendBeacon('/user/logout',
                    new Blob([JSON.stringify({ userId, type: 'refresh', gameType: 0 })],
                    { type: 'application/json' }));
            }
        });

        window.addEventListener('load', () => {
            if (!sessionStorage.getItem('userId')) {
                window.location.href = '/entry';
            }
        });
    </script>
</body>
</html>
