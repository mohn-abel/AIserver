<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 助手</title>
    <style>
        :root {
            --bg-primary: #0f0f1a;
            --bg-card: rgba(26, 26, 46, 0.85);
            --accent: #6c5ce7;
            --accent-glow: rgba(108, 92, 231, 0.4);
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --border: rgba(255, 255, 255, 0.08);
            --radius: 16px;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Inter", "Microsoft YaHei", system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--bg-primary);
            background-image: radial-gradient(ellipse at 50% 30%, rgba(108,92,231,0.12) 0%, transparent 60%);
            color: var(--text-primary);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7, #a855f7, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }

        .card {
            width: 400px;
            padding: 36px 32px;
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
            color: var(--text-primary);
        }

        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input {
            width: 100%;
            padding: 12px 14px;
            font-size: 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: var(--text-primary);
            outline: none;
            font-family: inherit;
            transition: var(--transition);
        }
        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 16px var(--accent-glow);
        }
        .field input::placeholder { color: rgba(255,255,255,0.2); }

        .btn {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 16px var(--accent-glow);
        }
        .btn:hover {
            background: #7c6ff7;
            box-shadow: 0 6px 24px var(--accent-glow);
            transform: translateY(-1px);
        }

        .switch {
            margin-top: 18px;
            font-size: 13px;
            text-align: center;
            color: var(--text-secondary);
        }
        .switch a {
            color: var(--accent);
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }
        .switch a:hover { text-decoration: underline; }

        #register-container { display: none; }

        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 8px 24px var(--accent-glow);
            z-index: 1000;
            display: none;
            animation: toastIn 0.3s ease;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(-12px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div>
        <div class="logo">AI 助手</div>

        <!-- 登录 -->
        <div class="card" id="login-container">
            <h2>登录</h2>
            <form id="login-form">
                <div class="field">
                    <label for="login-username">用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required>
                </div>
                <div class="field">
                    <label for="login-password">密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
            </form>
            <div class="switch">
                没有账号？<a onclick="showRegister()">去注册</a>
            </div>
        </div>

        <!-- 注册 -->
        <div class="card" id="register-container">
            <h2>注册</h2>
            <form id="register-form">
                <div class="field">
                    <label for="register-username">用户名</label>
                    <input type="text" id="register-username" placeholder="请输入用户名" required>
                </div>
                <div class="field">
                    <label for="register-password">密码</label>
                    <input type="password" id="register-password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">注册</button>
            </form>
            <div class="switch">
                已有账号？<a onclick="showLogin()">返回登录</a>
            </div>
        </div>
    </div>

    <script>
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => { el.style.display = 'none'; }, 1500);
        }

        function showRegister() {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('register-container').style.display = 'block';
        }
        function showLogin() {
            document.getElementById('register-container').style.display = 'none';
            document.getElementById('login-container').style.display = 'block';
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            try {
                const resp = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (resp.status === 403) { toast('账号已在其他地方登录！'); return; }
                if (resp.status === 401) { toast('账号或密码错误！'); return; }
                if (!resp.ok) throw new Error('请求失败');
                const data = await resp.json();
                if (data && data.userId) {
                    sessionStorage.setItem('userId', data.userId);
                    toast('登录成功！');
                    setTimeout(() => { window.location.href = '/menu'; }, 600);
                }
            } catch (err) {
                console.error(err);
                toast('操作失败，请重试');
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            try {
                const resp = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (resp.status === 200) {
                    toast('注册成功！');
                    document.getElementById('login-username').value = username;
                    document.getElementById('login-password').value = password;
                    setTimeout(showLogin, 1000);
                } else if (resp.status === 409) {
                    alert('用户名已被注册，请重新输入！');
                }
            } catch (err) { console.error('注册错误:', err); }
        });
    </script>
</body>
</html>
